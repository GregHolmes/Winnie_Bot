services:
  postgres:
    image: postgres:16-bookworm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m

  redis:
    image: redis:7-bookworm
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 64m

  migrations:
    build: .
    command: node dist/src/run-migrations.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build: .
    command: node dist/src/index.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - bot_logs:/app/logs
    restart: unless-stopped
    mem_limit: 256m

  worker:
    build: .
    command: node dist/src/workers/goal-worker.js
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 128m
    deploy:
      replicas: ${WORKER_REPLICAS:-1}

volumes:
  postgres_data:
  redis_data:
  bot_logs:
